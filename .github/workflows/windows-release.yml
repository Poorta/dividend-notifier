name: Build Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload the Windows build to"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows app
        shell: pwsh
        working-directory: packaging
        run: |
          pyinstaller --clean --noconfirm DividendNotifier-Windows.spec

      - name: Package ZIP
        shell: pwsh
        run: |
          $dist = "packaging/dist/Dividend Notifier"
          $zip = "DividendNotifier-windows-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "$dist/*" -DestinationPath $zip -Force
          Get-Item $zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DividendNotifier-windows-x64
          path: DividendNotifier-windows-x64.zip

      - name: Upload to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          gh release upload $env:RELEASE_TAG DividendNotifier-windows-x64.zip --clobber
